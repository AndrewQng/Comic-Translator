<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 13.5997 2.37562 15.1116 3.04348 16.4522L2 22L7.54783 20.9565C8.88837 21.6244 10.4003 22 12 22Z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 9H16M8 13H13" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
              <stop stop-color="#00FFA3"/>
              <stop offset="1" stop-color="#00B8FF"/>
            </linearGradient>
          </defs>
        </svg>
        <h1>Manga <span class="gradient-text">Translator</span></h1>
      </div>
      <p class="subtitle">Dịch bong bóng thoại bằng AI Gemini</p>
    </header>

    <main>
      <div class="input-group">
        <label for="apiKey">Gemini API Key</label>
        <div class="input-wrapper">
          <input type="password" id="apiKey" placeholder="Nhập API Key của bạn...">
          <button type="button" id="togglePassword" class="icon-btn" title="Hiện/Ẩn Key">
            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="help-text">
          Lấy API key miễn phí tại 
          <a href="https://aistudio.google.com/" target="_blank" id="aiStudioLink">Google AI Studio</a>.
        </span>
      </div>

      <div class="input-group">
        <label for="targetLanguage">Dịch sang ngôn ngữ</label>
        <div class="select-wrapper">
          <select id="targetLanguage">
            <option value="Vietnamese" selected>Tiếng Việt</option>
            <option value="English">Tiếng Anh (English)</option>
            <option value="Japanese">Tiếng Nhật (日本語)</option>
            <option value="Korean">Tiếng Hàn (한국어)</option>
            <option value="Chinese (Simplified)">Tiếng Trung (Giản thể)</option>
            <option value="French">Tiếng Pháp (Français)</option>
            <option value="Spanish">Tiếng Tây Ban Nha (Español)</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label for="geminiModel">Mô hình AI (Gemini)</label>
        <div class="select-wrapper">
          <select id="geminiModel">
            <option value="gemini-3.5-flash" selected>Gemini 3.5 Flash (20 lượt/ngày)</option>
            <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite (500 lượt/ngày 🔥)</option>
            <option value="gemini-3-flash">Gemini 3 Flash (20 lượt/ngày)</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash (20 lượt/ngày)</option>
            <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite (20 lượt/ngày)</option>
            <option value="gemini-3.1-pro">Gemini 3.1 Pro (Cao cấp)</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro (Cao cấp)</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label for="fontSizeMultiplier">Cỡ chữ (Tỉ lệ phóng to): <span id="fontSizeVal">1.0x</span></label>
        <div class="range-wrapper">
          <input type="range" id="fontSizeMultiplier" min="0.6" max="1.8" step="0.1" value="1.0">
        </div>
      </div>

      <div class="input-group">
        <label for="fontFamily">Kiểu chữ (Font Family)</label>
        <div class="select-wrapper">
          <select id="fontFamily">
            <option value="'Comic Sans MS', 'Chalkboard SE', -apple-system, sans-serif" selected>Manga Comic (Comic Sans)</option>
            <option value="'Segoe UI', -apple-system, sans-serif">Segoe UI (Hiện đại)</option>
            <option value="'Outfit', sans-serif">Outfit (Thanh lịch)</option>
            <option value="Arial, sans-serif">Arial (Tiêu chuẩn)</option>
            <option value="'Courier New', monospace">Monospace (Lập trình)</option>
            <option value="'Times New Roman', serif">Times New Roman (Cổ điển)</option>
          </select>
        </div>
      </div>


      <button id="saveBtn" class="primary-btn">
        <span>Lưu Cài Đặt</span>
        <div class="btn-glow"></div>
      </button>

      <div id="status" class="status-msg">Lưu thành công!</div>

      <div class="divider"></div>

      <button id="selectMultipleBtn" class="secondary-btn">
        <span>Chọn nhiều ảnh dịch</span>
      </button>
    </main>

    <footer>
      <p>Bấm chuột phải vào ảnh bất kỳ và chọn <strong>"Dịch ảnh này bằng AI"</strong> để sử dụng.</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
